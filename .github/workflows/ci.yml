name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI only checks out and builds — lock the GITHUB_TOKEN to read-only.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # biome check + tsc --noEmit + vitest run
      - run: pnpm run check
      - run: pnpm run build
