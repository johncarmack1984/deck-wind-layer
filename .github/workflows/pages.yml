name: Deploy demo to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for an OIDC-deployed Pages site.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Builds examples/ with base=/deck-wind-layer/ into examples/dist.
      - run: pnpm run build:demo
      - uses: actions/upload-pages-artifact@v5
        with:
          path: examples/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
