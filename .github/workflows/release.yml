name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# One release at a time.
concurrency: ${{ github.workflow }}

# Nothing by default; the job opts into exactly what it needs.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout + install only; the App token below does the writes
      id-token: write # npm OIDC trusted publishing (no NPM_TOKEN secret)
    steps:
      # Mint a short-lived token from the release GitHub App so the "Version
      # Packages" PR is opened by a non-bot identity -> CI runs on it without a
      # manual "approve workflows" click. The App needs Contents + Pull requests
      # write and must be installed on this repo.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }} # push the branch as the App
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # OIDC trusted publishing needs npm >= 11.5.1; pin to latest to be safe.
      - run: npm install -g npm@latest
      # With changesets present -> opens/updates the Version Packages PR.
      # With none present -> runs `release` (build + `changeset publish`), which
      # publishes any package whose version isn't yet on the registry.
      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
        env:
          # App token (not secrets.GITHUB_TOKEN) so the PR/commits come from the
          # App identity and trigger CI.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
